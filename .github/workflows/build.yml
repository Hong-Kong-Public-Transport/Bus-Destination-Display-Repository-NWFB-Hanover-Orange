name: Build
on:
  schedule:
    - cron: "20 19 * * *" # 3:20am HKT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    name: Build
    uses: Hong-Kong-Public-Transport/Bus-Destination-Display-Processor/.github/workflows/build.yml@master
  generate:
    name: Generate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
      - name: Download JAR
        uses: actions/download-artifact@main
        with:
          name: Artifact
          path: build/libs
      - name: Setup JDK 21
        uses: actions/setup-java@main
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Run JAR
        run: java -jar build/libs/Bus-Destination-Display-Processor-*-all.jar "${{ secrets.BASE_URL }}" "nwfb_hanover_orange" "display" "index" "cpp"
      - name: Commit changes
        uses: iarekylew00t/verified-bot-commit@main
        with:
          message: Update displays
          files: display/*.png
          max-retries: 5
